version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aiforge_backend
    ports:
      - "8000:8000"
    volumes:
      - ./datasets:/app/datasets
      - ./reports:/app/reports
      - ./aiforge.db:/app/aiforge.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aiforge_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped